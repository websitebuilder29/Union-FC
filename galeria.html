<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GALERÍA ELITE | UNIÓN TLAXCALA F.C.</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;900&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="elite-gallery">

    <nav class="navbar scrolled">
        <div class="nav-container">
            <div class="logo-space">
                <img src="LogoU.png" alt="Logo" class="logo-nav">
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="galeria.html" class="active-link">Galería</a></li>
            </ul>
        </div>
    </nav>

    <header class="ultra-header">
        <div class="bg-text">TLX</div>
        <div class="header-main-content">
            <span class="top-label">FOTOS OFICIALES</span>
            <h1 class="glitch-text">NUESTRA <span class="red-glow">GALERIA</span></h1>
            <div class="accent-line"></div>
        </div>
    </header>

    <main class="main-content-wrapper">
        <div class="nav-strip">
            <a href="galeria.html" class="cyber-btn">
                <i class="fas fa-th-large"></i> REINICIAR GALERÍA
            </a>
            <div class="status-indicator">
                <span class="dot"></span> LIVE FEED
            </div>
        </div>

        <div class="industrial-container">
            <div class="corner-decor top-left"></div>
            <div class="corner-decor top-right"></div>
            <div class="corner-decor bottom-left"></div>
            <div class="corner-decor bottom-right"></div>
            
            <div class="widget-inner-space">
                <div class='sk-ww-facebook-photo-albums' data-embed-id='25651631'></div>
                <script src='https://widgets.sociablekit.com/facebook-photo-albums/widget.js' defer></script>
            </div>
        </div>

        <section class="gallery-footer-cta">
            <div class="cta-content">
                <h2 class="shimmer-text">¿QUIERES VER MÁS?</h2>
                <p>Síguenos en nuestra pagina oficial para no perderte ningún detalle.</p>
                <div class="social-pills">
                    <a href="https://www.facebook.com/share/1DYohquiq6/" target="_blank" class="pill fb">
                        <i class="fab fa-facebook-f"></i> FACEBOOK
                    </a>
                </div>
            </div>
        </section>
    </main>

    <footer class="elite-footer">
        <div class="footer-container">
            <div class="footer-grid">
                <div class="footer-brand">
                    <img src="LogoU.png" alt="Logo" class="footer-logo">
                    <div class="brand-info">
                        <span class="brand-name">UNIÓN TLAXCALA <span class="red-text">F.C.</span></span>
                        <p class="brand-slogan">Forjando Leyendas</p>
                    </div>
                </div>
                <div class="footer-details">
                    <p>© 2026 Todos los derechos reservados.</p>
                    <p class="location-tag"><i class="fas fa-map-marker-alt"></i> Hueyotlipan, Tlaxcala</p>
                </div>
            </div>
            <div class="bottom-accent-bar"></div>
        </div>
    </footer>

    <script src="main.js"></script>
</body>
</html>
